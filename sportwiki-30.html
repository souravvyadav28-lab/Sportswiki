<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportWiki</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:#fff;--border:#e8eaef;--accent:#e63946;--green:#16a34a;--blue:#1d6fa4;--orange:#d97706;--text:#111827;--muted:#6b7280;--sub:#374151;--live:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh;}
header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr{max-width:700px;margin:0 auto;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#e63946,#ff6b00);display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue";font-size:17px;color:#fff;}
.logo-name{font-family:"Bebas Neue";font-size:22px;letter-spacing:2px;color:#111827;}
.logo-tag{font-size:8px;color:#e63946;font-weight:700;letter-spacing:1.5px;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.live-pill{display:none;align-items:center;gap:5px;background:#fff0f0;border:1px solid #fecaca;border-radius:20px;padding:4px 10px;font-size:11px;color:var(--live);font-weight:700;cursor:pointer;}
.ldot{width:6px;height:6px;background:var(--live);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nbell{width:32px;height:32px;background:#fff;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative;}
.nbadge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--accent);border-radius:50%;border:1.5px solid #fff;display:none;}
#livebanner{display:none;background:#fff;border-bottom:2px solid var(--live);padding:10px 14px;}
.lbhdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.lbhdr-txt{font-size:11px;font-weight:800;color:var(--live);letter-spacing:1.5px;text-transform:uppercase;}
.lbscroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.lbscroll::-webkit-scrollbar{display:none;}
.lbcard{background:#fff5f5;border:1px solid #fecaca;border-left:3px solid var(--live);border-radius:10px;padding:8px 12px;min-width:210px;cursor:pointer;flex-shrink:0;}
.lbcard:active{background:#fee2e2;}
.lbsport{font-size:9px;font-weight:800;color:var(--live);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.lbmatch{font-size:13px;font-weight:700;color:var(--text);}
.lbsc{color:var(--live);font-family:"Bebas Neue";font-size:15px;margin:0 3px;}
.lbsr{font-size:10px;color:var(--muted);margin-top:2px;}
.swrap{padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);position:relative;}
.sbox{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:9px 14px;transition:all .2s;}
.sbox:focus-within{border-color:var(--accent);background:#fff;}
.sinput{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);font-family:"Inter";outline:none;}
.sinput::placeholder{color:var(--muted);}
.sclear{font-size:14px;color:var(--muted);cursor:pointer;display:none;}
.sugg{position:absolute;left:14px;right:14px;top:100%;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:300;display:none;max-height:280px;overflow-y:auto;}
.sugg-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:active{background:var(--bg);}
.sresults{margin-top:10px;display:none;}
.sr-sec{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:4px 0 6px;}
.sr-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);}
.sr-card:active{background:#f3f4f6;}
.sr-nm{font-size:14px;font-weight:700;color:var(--text);}
.sr-info{font-size:11px;color:var(--muted);}
.sr-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
.sports-nav{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:199;}
.sports-nav::-webkit-scrollbar{display:none;}
.nav-inner{display:flex;padding:0 10px;max-width:700px;margin:0 auto;}
.sport-btn{display:flex;align-items:center;gap:4px;padding:10px 12px;border:none;border-bottom:2.5px solid transparent;background:transparent;color:var(--muted);font-family:"Inter";font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.sport-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
main{max-width:700px;margin:0 auto;padding:12px 12px 50px;}
.date-hdr{font-size:14px;font-weight:700;color:var(--text);padding:10px 2px 8px;}
.mgroup{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px;}
.snm{font-size:11px;color:var(--muted);font-weight:600;}
.nstar{font-size:16px;cursor:pointer;opacity:.5;}
.nstar.on{opacity:1;}
.mrow{display:flex;align-items:stretch;cursor:pointer;border-top:1px solid var(--border);transition:background .15s;}
.mrow:active{background:var(--bg);}
.tcol{flex:1;padding:11px 14px;display:flex;flex-direction:column;justify-content:center;gap:9px;}
.tr{display:flex;align-items:center;gap:9px;}
.flg{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--border);}
.tnm{font-size:14px;font-weight:600;color:var(--text);}
.tsc{font-size:11px;font-weight:700;margin-left:auto;color:var(--sub);text-align:right;max-width:130px;}
.vd{width:1px;background:var(--border);flex-shrink:0;margin:10px 0;}
.scol{width:100px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;gap:2px;}
.cdlbl{font-size:10px;color:var(--muted);font-weight:500;}
.cdval{font-size:15px;font-weight:700;color:var(--orange);font-family:"JetBrains Mono";text-align:center;}
.livebdg{font-size:11px;font-weight:800;color:var(--live);animation:blink 1s infinite;}
.ftlbl{font-size:11px;color:var(--muted);font-weight:600;text-align:center;}
.datelbl{font-size:11px;color:var(--blue);font-weight:600;text-align:center;line-height:1.4;}
.morebtn{padding:8px 14px 9px;font-size:13px;color:var(--blue);font-weight:700;cursor:pointer;border-top:1px solid var(--border);}
.nhdr{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:14px 2px 8px;}
.ncard{background:#fff;border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);}
.ncard:active{background:var(--bg);}
.nsrc{display:inline-block;font-size:10px;font-weight:800;color:var(--accent);background:#fff5f5;border-radius:4px;padding:2px 7px;margin-bottom:7px;}
.nttl{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:5px;}
.ndsc{font-size:12px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
.nft{font-size:11px;color:var(--muted);}
.schbtn-wrap{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:6px 0;}
.schbtn-wrap::-webkit-scrollbar{display:none;}
.schbtn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:"Inter";}
.schbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.schyear{font-family:"Bebas Neue";font-size:22px;letter-spacing:2px;color:var(--text);padding:14px 0 6px;border-bottom:2px solid var(--accent);margin-bottom:10px;}
.schcard{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border);}
.schtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.schtag{font-size:10px;font-weight:800;color:#fff;padding:2px 8px;border-radius:4px;}
.schimp{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;}
.sch-mega{background:#fce7f3;color:#9d174d;}
.sch-major{background:#fef3c7;color:#92400e;}
.schnm{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.schinfo{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.schresult{font-size:12px;color:var(--green);font-weight:700;margin-bottom:4px;}
.schdesc{font-size:12px;color:var(--muted);line-height:1.5;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:none;align-items:flex-end;}
.mbg.open{display:flex;}
.msheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;padding-bottom:50px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mgrip{padding:12px 0 0;display:flex;justify-content:center;}
.mgrip-bar{width:36px;height:4px;background:#e5e7eb;border-radius:2px;}
.mcrow{display:flex;justify-content:flex-end;padding:8px 14px 0;}
.mx{background:var(--bg);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;}
.md-series{font-size:11px;color:var(--muted);font-weight:600;padding:0 16px 8px;}
.md-srow{display:flex;justify-content:center;margin-bottom:14px;}
.md-live{background:#fef2f2;color:var(--live);border:1px solid #fecaca;font-size:11px;font-weight:800;padding:3px 14px;border-radius:20px;animation:blink 1s infinite;}
.md-upcoming{background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe;font-size:11px;font-weight:800;padding:3px 14px;border-radius:20px;}
.md-ft{background:#f9fafb;color:var(--muted);border:1px solid var(--border);font-size:11px;font-weight:800;padding:3px 14px;border-radius:20px;}
.md-sb{display:flex;align-items:center;justify-content:space-between;padding:0 16px 16px;gap:8px;}
.md-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.md-flag{width:54px;height:54px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;}
.md-tnm{font-size:13px;font-weight:700;color:var(--text);}
.md-sc{font-family:"Bebas Neue";font-size:24px;color:var(--text);}
.md-vs{font-family:"Bebas Neue";font-size:20px;color:var(--muted);}
.md-cd{font-family:"JetBrains Mono";font-size:18px;font-weight:700;color:var(--orange);text-align:center;}
.md-sec{margin:0 12px 10px;background:var(--bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.md-sec-t{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff;}
.md-row{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 14px;border-bottom:1px solid rgba(232,234,239,.6);}
.md-row:last-child{border-bottom:none;}
.md-lbl{font-size:12px;color:var(--muted);font-weight:500;}
.md-val{font-size:13px;color:var(--text);font-weight:600;text-align:right;max-width:58%;}
.h2h-wrap{padding:12px 14px;}
.h2h-names{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;font-weight:700;}
.h2h-bar{height:8px;border-radius:4px;background:#f3f4f6;display:flex;overflow:hidden;margin-bottom:6px;}
.h2h-home{background:var(--blue);}
.h2h-draw{background:#d1d5db;}
.h2h-away{background:var(--orange);}
.h2h-nums{display:flex;justify-content:space-between;font-size:13px;font-weight:700;}
.prow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(232,234,239,.6);}
.prow:last-child{border-bottom:none;}
.prank{width:18px;font-size:11px;color:var(--muted);font-weight:700;}
.pname{font-size:13px;font-weight:700;color:var(--text);}
.pteam{font-size:11px;color:var(--muted);}
.pstat{font-size:13px;font-weight:700;color:var(--accent);margin-left:auto;}
.cbox{margin:0 12px 10px;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.chdr{background:#fff;padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chdr-t{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.clist{background:var(--bg);max-height:200px;overflow-y:auto;padding:8px 12px;}
.citem{background:#fff;border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid var(--border);}
.citem:last-child{margin-bottom:0;}
.cover{font-size:10px;color:var(--accent);font-weight:700;margin-bottom:3px;}
.ctxt{font-size:13px;color:var(--text);line-height:1.45;}
.cinp-wrap{background:#fff;padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;}
.cinp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:"Inter";outline:none;color:var(--text);}
.cinp:focus{border-color:var(--accent);}
.csend{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.ntf-modal{padding:20px 16px;}
.ntf-hdr{font-family:"Bebas Neue";font-size:26px;color:var(--text);margin-bottom:16px;}
.ntf-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:10px;margin-bottom:8px;border:1px solid var(--border);}
.ntf-label{font-size:14px;font-weight:600;color:var(--text);}
.ntf-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.toggle{width:44px;height:24px;background:#d1d5db;border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.tdot{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on .tdot{left:22px;}
.wiki-hero{padding:20px 16px 16px;}
.wiki-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.wiki-flag{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#fff5f5,#ffe8e8);border:2px solid #fecaca;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;}
.wiki-name{font-family:"Bebas Neue";font-size:30px;color:var(--text);letter-spacing:1px;line-height:1;}
.wiki-sport{display:inline-block;font-size:11px;font-weight:800;color:var(--accent);background:#fff5f5;border-radius:4px;padding:2px 8px;margin:4px 0 2px;text-transform:uppercase;}
.wiki-bio{font-size:14px;line-height:1.75;color:var(--sub);background:var(--bg);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:12px;}
.wiki-sec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.wiki-tl{border-left:2px solid var(--border);margin-left:8px;padding-left:14px;}
.wiki-tl-item{position:relative;margin-bottom:14px;}
.wiki-tl-item::before{content:"";position:absolute;left:-19px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid #fff;}
.wiki-year{font-size:11px;font-weight:800;color:var(--accent);font-family:"JetBrains Mono";}
.wiki-text{font-size:13px;color:var(--text);line-height:1.5;margin-top:2px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;}
footer{text-align:center;padding:18px 16px 40px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:8px;background:#fff;}
.ticker-wrap{background:linear-gradient(90deg,#b91c1c,#e63946);overflow:hidden;height:26px;display:none;align-items:center;}
.ticker-lbl{background:rgba(0,0,0,.25);padding:0 12px;font-family:"Bebas Neue";font-size:11px;letter-spacing:2px;color:#fff;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;}
.ticker-inner{overflow:hidden;flex:1;}
.ticker-track{display:flex;animation:ticker 35s linear infinite;white-space:nowrap;}
.ticker-item{padding:0 22px;font-size:11px;font-weight:600;color:#fff;}
.ticker-item::after{content:"·";margin-left:22px;opacity:.5;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:500;box-shadow:0 -2px 10px rgba(0,0,0,.08);}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 12px;border-radius:10px;transition:all .15s;flex:1;}
.bn-item:active{background:var(--bg);}
.bn-icon{font-size:22px;line-height:1;}
.bn-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.3px;}
.bn-item.active .bn-label{color:var(--accent);}
.bn-item.active .bn-icon{transform:scale(1.1);}
.bn-center{position:relative;margin-top:-20px;}
.bn-center-inner{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#e63946,#ff6b00);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(230,57,70,.4);cursor:pointer;}
.bn-center-icon{font-size:24px;}
main{padding-bottom:80px!important;}
</style>
</head>
<body>
<div id="livebanner"></div>
<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-lbl">LIVE</div>
  <div class="ticker-inner"><div class="ticker-track" id="ticker-track"></div></div>
</div>
<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">SW</div>
      <div><div class="logo-name">SportWiki</div><div class="logo-tag">WATCH IT · KNOW IT</div></div>
    </div>
    <div class="hdr-right">
      <div class="live-pill" id="livepill" onclick="scrollToLive()">
        <div class="ldot"></div><span id="livecount">0 Live</span>
      </div>
      <div class="nbell" onclick="openNotif()">🔔<div class="nbadge" id="nbadge"></div></div>
    </div>
  </div>
</header>
<div class="swrap">
  <div class="sbox">
    <span style="font-size:15px;color:var(--muted)">🔍</span>
    <input class="sinput" id="sinput" type="text" placeholder="Search player, team, sport..." oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
    <span class="sclear" id="sclear" onclick="clearSearch()">✕</span>
  </div>
  <div class="sugg" id="sugg"></div>
  <div class="sresults" id="sresults"></div>
</div>
<div class="sports-nav">
  <div class="nav-inner">
    <button class="sport-btn active" onclick="go('all')" data-s="all">🌍 ALL</button>
    <button class="sport-btn" onclick="go('Cricket')" data-s="Cricket">🏏 CRICKET</button>
    <button class="sport-btn" onclick="go('Soccer')" data-s="Soccer">⚽ FOOTBALL</button>
    <button class="sport-btn" onclick="go('Tennis')" data-s="Tennis">🎾 TENNIS</button>
    <button class="sport-btn" onclick="go('Basketball')" data-s="Basketball">🏀 BASKETBALL</button>
    <button class="sport-btn" onclick="go('Baseball')" data-s="Baseball">⚾ BASEBALL</button>
    <button class="sport-btn" onclick="go('Hockey')" data-s="Hockey">🏒 HOCKEY</button>
    <button class="sport-btn" onclick="go('Rugby')" data-s="Rugby">🏉 RUGBY</button>
    <button class="sport-btn" onclick="go('F1')" data-s="F1">🏎️ F1</button>
    <button class="sport-btn" onclick="go('Olympics')" data-s="Olympics">🥇 OLYMPICS</button>
    <button class="sport-btn" onclick="go('news')" data-s="news">📰 NEWS</button>
    <button class="sport-btn" onclick="go('schedule')" data-s="schedule">📅 SCHEDULE</button>

function timeAgo(t){var d=Math.floor((Date.now()-t)/60000);if(d<1)return"Just now";if(d<60)return d+"m ago";if(d<1440)return Math.floor(d/60)+"h ago";return Math.floor(d/1440)+"d ago";}
function countdown(ms){if(!ms)return null;var diff=ms-Date.now();if(diff<=0)return null;var h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);if(h>0)return String(h).padStart(2,"0")+"h : "+String(m).padStart(2,"0")+"m";return String(m).padStart(2,"0")+"m : "+String(s).padStart(2,"0")+"s";}
function getNews(s){if(s==="all"||s==="news"){var seen={},out=[];(NEWS.all||[]).concat(Object.values(NEWS).reduce(function(a,b){return a.concat(b);},[]) ).forEach(function(a){if(!seen[a.title]){seen[a.title]=1;out.push(a);}});return out;}return(NEWS[s]||[]).concat(NEWS.all||[]);}

  var b=document.getElementById("livebanner"),p=document.getElementById("livepill");

  p.style.display="flex";document.getElementById("livecount").textContent=live.length+" Live";
  var html='<div class="lbhdr"><div class="ldot"></div><div class="lbhdr-txt">Live Now - '+live.length+' Match'+(live.length>1?"es":"")+'</div></div><div class="lbscroll">';

    html+='<div class="lbcard" data-idx="'+i+'" onclick="openLiveCard(this)"><div class="lbsport">'+x.sp+'</div><div class="lbmatch">'+m.h+' <span class="lbsc">'+sc+'</span> '+m.a+'</div><div class="lbsr">'+x.sr+'</div></div>';

  var h='<div class="date-hdr">Today, '+TODAY.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+"</div>";
  var any=false;
  sports.forEach(function(sp){

function mRow(m,sp,sr,idx){
  var hasSc=m.hs&&m.hs.length>0;var c=m.st==="upcoming"?countdown(m.ms2):null;
  var st="";
  if(m.st==="live")st='<div class="livebdg">LIVE</div>';

  else if(c)st='<div class="cdlbl">Starting in:</div><div class="cdval" data-ms="'+m.ms2+'">'+c+"</div>";
  else st='<div class="datelbl">Upcoming</div>';
  return '<div class="mrow" data-sp="'+sp+'" data-sr="'+sr+'" data-idx="'+idx+'" onclick="openMatchEl(this)">'
    +'<div class="tcol"><div class="tr"><div class="flg">'+m.hf+'</div><span class="tnm">'+m.h+'</span>'+(hasSc&&m.hs?'<span class="tsc">'+m.hs+"</span>":"")+"</div>"
    +'<div class="tr"><div class="flg">'+m.af+'</div><span class="tnm">'+m.a+"</span>"+(hasSc&&m.as?'<span class="tsc">'+m.as+"</span>":"")+"</div>"

}

  var grp=(M[sp]||[]).find(function(g){return g.sr===sr;});if(!grp)return;
  var m=grp.ms[idx];if(!m)return;var d=m.d||{};
  var hasSc=m.hs&&m.as&&m.st!=="upcoming";var c=m.st==="upcoming"?countdown(m.ms2):null;
  var h2h=d.h2h||{hw:0,dr:0,aw:0,t:0};var tot=h2h.t||1;
  var hwp=Math.round(h2h.hw/tot*100),dp=Math.round(h2h.dr/tot*100),awp=100-hwp-dp;
  var badge=m.st==="live"?'<span class="md-live">LIVE</span>':m.st==="finished"?'<span class="md-ft">'+(d.result||"FULL TIME")+"</span>":'<span class="md-upcoming">UPCOMING</span>';
  var scoreBl="";
  if(hasSc)scoreBl='<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="md-sc">'+m.hs+'</div><div class="md-vs">VS</div><div class="md-sc">'+m.as+"</div></div>";
  else if(c)scoreBl='<div style="text-align:center"><div style="font-size:10px;color:var(--muted)">Starting in:</div><div class="md-cd" id="mdcd" data-ms="'+m.ms2+'">'+c+"</div></div>";
  else scoreBl='<div class="md-vs">VS</div>';
  var perfs=(d.perf||[]).map(function(p,i){return'<div class="prow"><div class="prank">'+(i+1)+'</div><div style="flex:1"><div class="pname">'+p.n+'</div><div class="pteam">'+p.tm+"</div></div>"+'<div class="pstat">'+p.s+"</div></div>";}).join("");
  var comms=(d.comm||[]).map(function(c){return'<div class="citem"><div class="cover">'+c.o+'</div><div class="ctxt">'+c.t+"</div></div>";}).join("");
  var html='<div style="padding:0 16px"><div class="md-series">'+grp.sr+'</div><div class="md-srow">'+badge+"</div>"
    +'<div class="md-sb"><div class="md-team"><div class="md-flag">'+m.hf+'</div><div class="md-tnm">'+m.h+"</div></div>"+scoreBl+'<div class="md-team"><div class="md-flag">'+m.af+'</div><div class="md-tnm">'+m.a+"</div></div></div></div>"
    +'<div class="md-sec"><div class="md-sec-t">Match Info</div>'
    +'<div class="md-row"><span class="md-lbl">Venue</span><span class="md-val">'+(d.venue||"TBD")+"</span></div>"
    +'<div class="md-row"><span class="md-lbl">Date</span><span class="md-val">'+(d.date||"TBD")+"</span></div>"
    +'<div class="md-row"><span class="md-lbl">Time</span><span class="md-val">'+(d.time||"TBD")+"</span></div>"
    +'<div class="md-row"><span class="md-lbl">Format</span><span class="md-val">'+(d.fmt||"TBD")+"</span></div>"
    +(d.result?'<div class="md-row"><span class="md-lbl">Result</span><span class="md-val" style="color:var(--green)">'+d.result+"</span></div>":"")
    +"</div>";
  if(h2h.t>0)html+='<div class="md-sec"><div class="md-sec-t">Head to Head ('+h2h.t+' matches)</div><div class="h2h-wrap"><div class="h2h-names"><span style="color:var(--blue)">'+m.h+'</span><span style="color:var(--muted)">Draws</span><span style="color:var(--orange)">'+m.a+'</span></div><div class="h2h-bar"><div class="h2h-home" style="width:'+hwp+'%"></div><div class="h2h-draw" style="width:'+dp+'%"></div><div class="h2h-away" style="width:'+awp+'%"></div></div><div class="h2h-nums"><span style="color:var(--blue)">'+h2h.hw+" W</span>"+'<span style="color:var(--muted)">'+h2h.dr+" D</span>"+'<span style="color:var(--orange)">'+h2h.aw+" W</span></div></div></div>";
  if(perfs)html+='<div class="md-sec"><div class="md-sec-t">Key Players</div>'+perfs+"</div>";
  if(d.prev)html+='<div class="md-sec"><div class="md-sec-t">Preview</div><div style="padding:12px 14px;font-size:14px;color:var(--sub);line-height:1.7">'+d.prev+"</div></div>";
  if(comms)html+='<div class="cbox"><div class="chdr"><div class="chdr-t">Commentary'+(m.st==="live"?" LIVE":"")+"</div></div>"+'<div class="clist">'+comms+"</div>"+(m.st==="live"?'<div class="cinp-wrap"><input class="cinp" id="cinp" placeholder="Add your reaction..." maxlength="100"><button class="csend" onclick="sendC()">Send</button></div>':"")+"</div>";

}

function renderSch(){
  var root=document.getElementById("root");
  var sports=["All"].concat([...new Set(SCHEDULE.map(function(s){return s.sp;}))]);
  var filtered=SCHEDULE;
  if(schEra!=="all")filtered=filtered.filter(function(s){return s.era===schEra;});
  if(schSp!=="All")filtered=filtered.filter(function(s){return s.sp===schSp;});
  var byYear={};filtered.forEach(function(s){var m=s.d.match(/\d{4}/);var y=m?m[0]:"2026";if(!byYear[y])byYear[y]=[];byYear[y].push(s);});
  var sortedY=Object.keys(byYear).sort(function(a,b){return schEra==="past"?b-a:a-b;});
  var h='<div class="schbtn-wrap">';
  [{k:"future",l:"Upcoming"},{k:"past",l:"History"},{k:"all",l:"All Time"}].forEach(function(e){h+='<div class="schbtn'+(schEra===e.k?" active":"")+'\" data-k="'+e.k+'" onclick="setEra(this)">'+e.l+"</div>";});
  h+='</div><div class="schbtn-wrap">';
  sports.forEach(function(sp){h+='<div class="schbtn'+(schSp===sp?" active":"")+'\" data-sp="'+sp+'" onclick="setSchSp(this)">'+sp+"</div>";});
  h+='</div><div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600">'+filtered.length+" tournaments</div>";
  if(!filtered.length)h+='<div style="text-align:center;padding:40px;color:var(--muted)">No tournaments found</div>';
  else sortedY.forEach(function(y){h+='<div class="schyear">'+(schEra==="past"?"Trophy":"Calendar")+" "+y+"</div>";byYear[y].forEach(function(s){var ic=s.i==="mega"?"sch-mega":"sch-major";var it=s.i==="mega"?"MEGA":"MAJOR";h+='<div class="schcard"><div class="schtop"><span class="schtag" style="background:'+s.c+'">'+s.e+" "+s.sp+"</span>"+'<span class="schimp '+ic+'">'+it+"</span></div>"+'<div class="schnm">'+s.n+'</div><div class="schinfo"><span>'+s.d+'</span><span>'+s.l+'</span></div>'+(s.era==="past"&&s.r?'<div class="schresult">'+s.r+"</div>":"")+'<div class="schdesc">'+s.desc+"</div></div>";});});
  root.innerHTML=h;
}

function onSearch(val){
  var sc=document.getElementById("sclear"),sugg=document.getElementById("sugg"),sr=document.getElementById("sresults"),root=document.getElementById("root");
  sc.style.display=val?"block":"none";
  if(!val||!val.trim()){sugg.style.display="none";sr.style.display="none";root.style.display="block";return;}
  root.style.display="none";var q=val.toLowerCase().trim();
  if(val.trim().length<=3){
    var mx=DBP.concat(DBT).filter(function(x){return x.n.toLowerCase().startsWith(q)||x.n.toLowerCase().includes(q)||(x.al||[]).some(function(a){return a.toLowerCase().startsWith(q);});}).slice(0,6);
    if(mx.length){sugg.style.display="block";sr.style.display="none";sugg.innerHTML=mx.map(function(p){return'<div class="sugg-item" data-nm="'+p.n+'" onclick="pickS(this)"><div style="width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">'+p.fl+'</div><div><div style="font-size:13px;font-weight:700;color:var(--text)">'+p.n+'</div><div style="font-size:11px;color:var(--muted)">'+p.sp+(p.tm?" - "+p.tm:"")+"</div></div></div>";}).join("");}
    else sugg.style.display="none";return;
  }
  sugg.style.display="none";sr.style.display="block";
  var pl=DBP.filter(function(p){return p.n.toLowerCase().includes(q)||p.sp.toLowerCase().includes(q)||p.tm.toLowerCase().includes(q)||(p.al||[]).some(function(a){return a.toLowerCase().includes(q)||q.includes(a.toLowerCase());});});
  var tm=DBT.filter(function(t){return t.n.toLowerCase().includes(q)||t.sp.toLowerCase().includes(q)||(t.al||[]).some(function(a){return a.toLowerCase().includes(q);});});
  if(!pl.length&&!tm.length){sr.innerHTML='<div class="sr-empty">No results for "'+val+'"<br><small>Try: Virat Kohli, CR7, Thala, Real Madrid, 7...</small></div>';return;}
  var h="";

  if(tm.length){h+='<div class="sr-sec" style="margin-top:8px">Teams ('+tm.length+")</div>";tm.slice(0,4).forEach(function(t){h+='<div class="sr-card" data-type="t" data-nm="'+t.n+'" onclick="openWikiEl(this)"><div style="width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+t.fl+'</div><div style="flex:1"><div class="sr-nm">'+t.n+'</div><div class="sr-info">'+t.sp+"</div></div></div>";});}
  sr.innerHTML=h;
}

}

function shareApp() {
  if(navigator.share) {
    navigator.share({title:'SportWiki',text:'Watch It, Know It, Live It!',url:window.location.href});

}
